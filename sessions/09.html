<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>第09场 · 混圈与沉淀 — 生财有术线下活动</title>
<meta name="description" content="生财有术第9场线下组局 · 混圈与沉淀 — PPT版精华整理">

<meta name="twitter:card" content="summary">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--t:0.3s ease}
[data-theme="dark"]{
  --bg:#0a0a0a;--bg-1:#111;--bg-2:#1a1a1a;
  --fg:#f5f5f5;--fg-dim:#a8a8a8;--fg-mute:#666;
  --accent:#00d9a3;--accent-2:#00b4d8;
  --line:rgba(255,255,255,.08);--card:rgba(255,255,255,.03);
}
[data-theme="light"]{
  --bg:#f5f2ec;--bg-1:#ebe6dc;--bg-2:#ffffff;
  --fg:#1a2b28;--fg-dim:#4a5957;--fg-mute:#8a9694;
  --accent:#2d8a7a;--accent-2:#4a9b8e;
  --line:rgba(45,138,122,.12);--card:rgba(255,255,255,.6);
}
[data-theme="paper"]{
  --bg:#f1ead9;--bg-1:#ebe3cd;--bg-2:#f1ead9;
  --fg:#3a2818;--fg-dim:#5a4030;--fg-mute:#8a6f5a;
  --accent:#a83226;--accent-2:#c94a3a;
  --line:rgba(168,50,38,.16);--card:rgba(168,50,38,.04);
}
[data-theme="ocean"]{
  --bg:#0e2147;--bg-1:#132a55;--bg-2:#16305a;
  --fg:#d6e6ff;--fg-dim:#a2bde0;--fg-mute:#7a93b8;
  --accent:#4fd1c5;--accent-2:#63e0d6;
  --line:rgba(79,209,197,.16);--card:rgba(79,209,197,.04);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:"Noto Sans SC",-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--fg);
  font-weight:400;letter-spacing:.02em;
  transition:background .3s,color .3s;
}
.topbar{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--bg);border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;
}
.topbar .back{color:var(--fg-dim);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px}
.topbar .back:hover{color:var(--accent)}
.topbar .title{flex:1;text-align:center;font-size:14px;font-weight:500;letter-spacing:.05em}
.topbar .toggle{color:var(--fg-dim);text-decoration:none;font-size:12px;padding:4px 10px;border:1px solid var(--line);border-radius:12px}
.topbar .toggle:hover{color:var(--accent);border-color:var(--accent)}
.topbar .theme-btn{background:none;border:1px solid var(--line);color:var(--fg-dim);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.topbar .theme-btn:hover{color:var(--accent);border-color:var(--accent)}
.theme-switcher{display:inline-flex;gap:4px;padding:3px;background:var(--card);border:1px solid var(--line);border-radius:14px;transition:all var(--t)}
.theme-switcher .chip{width:20px;height:20px;border-radius:50%;border:1px solid transparent;cursor:pointer;font-size:0;padding:0;transition:all 0.2s}
.theme-switcher .chip[data-t="dark"]{background:#0a0a0a;border-color:#333}
.theme-switcher .chip[data-t="light"]{background:#f5f2ec;border-color:#c8b896}
.theme-switcher .chip[data-t="paper"]{background:#f1ead9;border-color:#d4c8a8}
.theme-switcher .chip[data-t="ocean"]{background:#0e2147;border-color:#1e3a66}
.theme-switcher .chip:hover{transform:scale(1.15)}
.theme-switcher .chip.active{box-shadow:0 0 0 2px var(--accent)}

.tabs{
  position:fixed;top:52px;left:0;right:0;height:44px;
  background:var(--bg);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:4px;padding:0 12px;
  overflow-x:auto;scrollbar-width:none;z-index:99;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:6px 12px;font-size:12px;color:var(--fg-mute);
  border:1px solid transparent;border-radius:14px;cursor:pointer;
  white-space:nowrap;transition:all .2s;
}
.tab:hover{color:var(--fg-dim)}
.tab.active{color:var(--accent);border-color:var(--accent);background:var(--card)}

.viewport{
  position:fixed;top:96px;left:0;right:0;bottom:56px;
  overflow:hidden;
}
.slide-track{
  display:flex;height:100%;
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
.slide{
  flex-shrink:0;width:100%;height:100%;
  padding:24px 24px 8px;
  overflow-y:auto;scrollbar-width:none;
  display:flex;flex-direction:column;
}
.slide::-webkit-scrollbar{display:none}

.slide .label{
  font-size:11px;color:var(--accent);letter-spacing:.2em;
  text-transform:uppercase;margin-bottom:12px;font-weight:500;
}
.slide h1{
  font-size:28px;font-weight:900;line-height:1.3;
  margin-bottom:16px;letter-spacing:-.01em;
}
.slide h2{
  font-size:20px;font-weight:700;line-height:1.4;
  margin-bottom:14px;color:var(--fg);
}
.slide p{
  font-size:15px;line-height:1.8;color:var(--fg-dim);
  margin-bottom:12px;
}
.slide .quote{
  font-size:17px;line-height:1.7;color:var(--fg);
  font-weight:500;padding:16px 18px;
  border-left:3px solid var(--accent);
  background:var(--card);border-radius:0 8px 8px 0;
  margin:12px 0;
}
.slide .context{
  font-size:13px;color:var(--fg-mute);line-height:1.7;
  padding-top:12px;border-top:1px dashed var(--line);margin-top:auto;
}
.slide ul{list-style:none;margin:8px 0}
.slide ul li{
  font-size:14px;line-height:1.8;color:var(--fg-dim);
  padding:8px 0 8px 22px;position:relative;
  border-bottom:1px solid var(--line);
}
.slide ul li::before{
  content:"";position:absolute;left:4px;top:16px;
  width:6px;height:6px;border-radius:50%;background:var(--accent);
}
.slide ul li:last-child{border-bottom:none}
.slide ul li strong{color:var(--fg);font-weight:600}

.slide .steps{margin:10px 0}
.slide .steps .step{
  display:flex;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--line);
}
.slide .steps .step:last-child{border-bottom:none}
.slide .steps .num{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  background:var(--card);border:1px solid var(--accent);
  color:var(--accent);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.slide .steps .txt{flex:1;font-size:14px;line-height:1.7;color:var(--fg-dim)}
.slide .steps .txt strong{color:var(--fg);display:block;margin-bottom:2px}

.slide .products{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.slide .products .p{
  padding:12px;background:var(--card);border:1px solid var(--line);
  border-radius:8px;
}
.slide .products .p .n{font-size:13px;color:var(--accent);font-weight:600;margin-bottom:4px}
.slide .products .p .d{font-size:12px;color:var(--fg-mute);line-height:1.6}

.slide .questioner{
  display:inline-block;font-size:11px;padding:3px 8px;
  background:var(--card);border:1px solid var(--accent);
  color:var(--accent);border-radius:10px;margin-bottom:10px;
}

.slide.cover{
  justify-content:center;align-items:center;text-align:center;
  background:radial-gradient(ellipse at center,var(--bg-1),var(--bg));
}
.slide.cover .big{
  font-size:40px;font-weight:900;line-height:1.2;
  margin-bottom:12px;letter-spacing:-.02em;
}
.slide.cover .sub{
  font-size:16px;color:var(--fg-dim);margin-bottom:24px;
  letter-spacing:.1em;
}
.slide.cover .mark{
  font-size:12px;color:var(--accent);letter-spacing:.3em;
  padding:6px 14px;border:1px solid var(--accent);border-radius:16px;
}

.bottombar{
  position:fixed;bottom:0;left:0;right:0;height:64px;
  background:var(--bg);border-top:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;gap:12px;
}
.bottombar .nav{
  background:rgba(0,217,163,.08);border:1px solid var(--line);color:var(--accent);
  min-width:92px;height:40px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;
  letter-spacing:1px;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;padding:0 18px;
  transition:all .2s;flex-shrink:0;
}
.bottombar .nav .arrow{font-size:15px;line-height:1}
.bottombar .nav:hover{background:rgba(0,217,163,.15);border-color:var(--accent);transform:translateY(-1px)}
.bottombar .nav:disabled{opacity:.3;cursor:not-allowed;transform:none}
@media(max-width:520px){
  .bottombar .nav{min-width:44px;padding:0 10px}
  .bottombar .nav .label{display:none}
}
.bottombar .dots{
  flex:1;display:flex;justify-content:center;gap:5px;
  max-width:60%;overflow-x:auto;scrollbar-width:none;
}
.bottombar .dots::-webkit-scrollbar{display:none}
.bottombar .dot{
  flex-shrink:0;width:6px;height:6px;border-radius:50%;
  background:var(--line);cursor:pointer;transition:all .2s;
}
.bottombar .dot.active{background:var(--accent);width:18px;border-radius:3px}
.bottombar .count{font-size:12px;color:var(--fg-mute);min-width:40px;text-align:right}

.key-hint{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--fg-mute);pointer-events:none;
  display:flex;align-items:center;gap:6px;
  background:var(--bg);padding:5px 14px;border-radius:20px;
  border:1px solid var(--line);backdrop-filter:blur(6px);
  opacity:.85;z-index:99;
}
.key-hint kbd{
  font-family:'SF Mono',Monaco,monospace;font-size:11px;
  padding:1px 6px;border-radius:4px;
  background:var(--card);border:1px solid var(--line);
  color:var(--accent);line-height:1.4;
}
@media(max-width:768px){.key-hint{display:none}}

@media(max-width:380px){
  .slide h1{font-size:24px}
  .slide.cover .big{font-size:32px}
}

  /* === C: 翻页动效与键位反馈 === */

  /* 顶部章节进度条 */
  .progress {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: transparent;
    z-index: 110;
    pointer-events: none;
  }
  .progress::after {
    content: '';
    display: block;
    height: 100%;
    width: var(--progress, 0%);
    background: var(--accent);
    transition: width 0.45s cubic-bezier(0.22,1,0.36,1);
  }

  /* 更顺滑的翻页缓动 */
  .slide-track {
    transition: transform 0.55s cubic-bezier(0.22,1,0.36,1) !important;
  }

  /* slide 内容 stagger 淡入 */
  .slide .slide-inner > * {
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s cubic-bezier(0.22,1,0.36,1),
                transform 0.6s cubic-bezier(0.22,1,0.36,1);
  }
  .slide.current .slide-inner > * {
    opacity: 1;
    transform: translateY(0);
  }
  .slide.current .slide-inner > *:nth-child(1) { transition-delay: 0.05s; }
  .slide.current .slide-inner > *:nth-child(2) { transition-delay: 0.13s; }
  .slide.current .slide-inner > *:nth-child(3) { transition-delay: 0.21s; }
  .slide.current .slide-inner > *:nth-child(4) { transition-delay: 0.29s; }
  .slide.current .slide-inner > *:nth-child(5) { transition-delay: 0.37s; }
  .slide.current .slide-inner > *:nth-child(6) { transition-delay: 0.45s; }
  .slide.current .slide-inner > *:nth-child(7) { transition-delay: 0.53s; }

  /* cover slide 标题更戏剧化 */
  .slide.cover.current .slide-title {
    animation: coverTitleIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.15s both;
  }
  @keyframes coverTitleIn {
    0%   { opacity: 0; transform: translateY(18px) scale(0.985); letter-spacing: -0.005em; }
    100% { opacity: 1; transform: translateY(0)    scale(1);     letter-spacing: 0; }
  }

  /* 键盘按下时按钮闪一下 */
  .nav-btn.pressed {
    background: var(--accent) !important;
    color: var(--bg) !important;
    transform: scale(0.96);
    transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
  }

  /* dot 涟漪 + 更紧的反馈 */
  .dot {
    position: relative;
    transition: all 0.3s cubic-bezier(0.22,1,0.36,1) !important;
  }
  .dot:hover { transform: scale(1.35); }
  .dot.active:hover { transform: scale(1); }
  .dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0;
    transform: scale(0.6);
    pointer-events: none;
  }
  .dot.ripple::after {
    animation: dotRipple 0.55s ease-out;
  }
  @keyframes dotRipple {
    0%   { opacity: 0.7; transform: scale(0.6); }
    100% { opacity: 0;   transform: scale(2.2); }
  }

  /* 首次交互后 hint 渐隐 */
  .key-hint {
    transition: opacity 0.6s ease, transform 0.6s ease !important;
  }
  .key-hint.hidden {
    opacity: 0 !important;
    transform: translateX(-50%) translateY(8px) !important;
    pointer-events: none;
  }

  /* tab 切换时下划线滑动感 */
  .tabs button {
    position: relative;
  }
  .tabs button::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 14px;
    right: 14px;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: center;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .tabs button.active::after {
    transform: scaleX(1);
  }
  .tabs button.active {
    border-bottom-color: transparent !important;
  }

  @media (prefers-reduced-motion: reduce) {
    .slide .slide-inner > * { opacity: 1 !important; transform: none !important; transition: none !important; }
    .slide.cover.current .slide-title { animation: none !important; }
    .progress::after { transition: none !important; }
  }


  /* === D: 跨页面动效一致性 === */
  body {
    opacity: 0;
    transition: opacity 0.45s cubic-bezier(0.22,1,0.36,1);
  }
  body.page-ready {
    opacity: 1;
  }
  body.page-leaving {
    opacity: 0;
    transition: opacity 0.32s cubic-bezier(0.4,0,0.6,1);
  }
  /* 统一 focus-visible 视感 */
  a:focus-visible,
  button:focus-visible,
  input:focus-visible {
    outline: 2px solid var(--accent, currentColor);
    outline-offset: 3px;
    border-radius: 3px;
  }
  @media (prefers-reduced-motion: reduce) {
    body, body.page-leaving { transition: none !important; opacity: 1 !important; }
  }


  /* === G: PPT 上下场浮动导航 === */
  .ppt-session-nav { position: fixed; top: 50%; transform: translateY(-50%); z-index: 80; pointer-events: none; }
  .ppt-session-nav a {
    pointer-events: auto;
    position: fixed; top: 50%;
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--card-bg, rgba(255,255,255,0.03));
    border: 1px solid var(--rule, rgba(255,255,255,0.1));
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; font-family: 'Playfair Display', Georgia, serif; font-size: 1.1rem;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
    opacity: 0.45;
  }
  .ppt-session-nav a.psn-prev { left: 18px; transform: translateY(-50%); }
  .ppt-session-nav a.psn-next { right: 18px; transform: translateY(-50%); }
  .ppt-session-nav a:hover { opacity: 1; border-color: var(--accent); color: var(--accent); box-shadow: 0 6px 22px -10px var(--accent); }
  .ppt-session-nav a.psn-prev:hover { transform: translate(-3px, -50%); }
  .ppt-session-nav a.psn-next:hover { transform: translate(3px, -50%); }
  .ppt-session-nav a.psn-disabled { opacity: 0.15; pointer-events: none; }
  .ppt-session-nav .psn-tip {
    position: absolute; top: 50%; transform: translateY(-50%);
    white-space: nowrap;
    background: var(--card-bg, rgba(0,0,0,0.85));
    color: var(--text);
    border: 1px solid var(--rule, rgba(255,255,255,0.1));
    padding: 7px 12px; border-radius: 6px;
    font-size: 0.72rem; letter-spacing: 0.04em;
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .ppt-session-nav .psn-prev .psn-tip { left: calc(100% + 12px); }
  .ppt-session-nav .psn-next .psn-tip { right: calc(100% + 12px); }
  .ppt-session-nav a:hover .psn-tip { opacity: 1; transform: translate(0,-50%); }
  .ppt-session-nav .psn-tip .psn-num { color: var(--accent); font-family: 'Playfair Display', Georgia, serif; font-weight: 700; margin-right: 6px; }
  @media (max-width: 720px) { .ppt-session-nav a { width: 38px; height: 38px; font-size: 0.95rem; } .ppt-session-nav a.psn-prev { left: 8px; } .ppt-session-nav a.psn-next { right: 8px; } .ppt-session-nav .psn-tip { display: none; } }

  /* === H: 快捷键遮罩 === */
  .kb-hint-trigger {
    position: fixed; bottom: 18px; left: 18px; z-index: 90;
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--card-bg, rgba(255,255,255,0.03));
    border: 1px solid var(--rule, rgba(255,255,255,0.12));
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', Georgia, serif; font-size: 0.92rem;
    cursor: pointer; transition: all 0.3s ease;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    opacity: 0.5;
  }
  .kb-hint-trigger:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }
  .kb-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.72); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  .kb-overlay.visible { display: flex; opacity: 1; }
  .kb-panel {
    background: var(--bg, #0a0a08);
    border: 1px solid var(--rule, rgba(255,255,255,0.12));
    border-radius: 14px;
    padding: 2.4rem 2.6rem;
    max-width: 520px; width: 90vw;
    box-shadow: 0 40px 100px -30px rgba(0,0,0,0.8);
    transform: scale(0.94); transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  .kb-overlay.visible .kb-panel { transform: scale(1); }
  .kb-panel h3 {
    font-family: 'Playfair Display', Georgia, serif;
    color: var(--text); font-size: 1.35rem; font-weight: 600;
    margin: 0 0 1.4rem; letter-spacing: 0.02em;
  }
  .kb-panel h3 span { color: var(--accent); font-style: italic; }
  .kb-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.85rem; }
  .kb-list li { display: flex; align-items: center; gap: 1rem; color: var(--text-muted); font-size: 0.82rem; letter-spacing: 0.03em; }
  .kb-key {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 32px; padding: 4px 9px;
    background: var(--card-bg, rgba(255,255,255,0.04));
    border: 1px solid var(--rule, rgba(255,255,255,0.14));
    border-bottom-width: 2px;
    border-radius: 5px;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 0.72rem; color: var(--text);
    font-weight: 500;
  }
  .kb-close {
    position: absolute; top: 16px; right: 18px;
    background: none; border: none; color: var(--text-muted);
    font-size: 1.5rem; cursor: pointer; font-family: 'Playfair Display', serif;
    line-height: 1; padding: 4px 8px; border-radius: 4px;
    transition: color 0.25s ease;
  }
  .kb-close:hover { color: var(--accent); }
  .kb-panel { position: relative; }


  /* === J: 触摸滑动手势辅助 === */
  .viewport { touch-action: pan-y; }
  .slide-track { will-change: transform; }
  .swipe-hint {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    padding: 8px 18px; border-radius: 20px;

let sectionIndex = 0, slideIndex = 0, globalIndex = 0;
const flatSlides = [];
sections.forEach((s,si)=>s.slides.forEach((sl,sli)=>flatSlides.push({...sl,si,sli})));

function renderTabs(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = sections.map((s,i)=>`<div class="tab ${i===sectionIndex?'active':''}" onclick="goToSection(${i})">${s.label}</div>`).join("");
}
function renderSlides(){
  const track = document.getElementById("track");
  track.innerHTML = flatSlides.map(sl=>{
    if(sl.type==="cover"){
      return `<div class="slide cover"><div class="big">${sl.big}</div><div class="sub">${sl.sub}</div><div class="mark">${sl.mark}</div></div>`;
    }
    let html = `<div class="slide">`;
    if(sl.label) html += `<div class="label">${sl.label}</div>`;
    if(sl.questioner) html += `<div class="questioner">◆ ${sl.questioner}</div>`;
    if(sl.title) html += `<h1>${sl.title}</h1>`;
    if(sl.h2) html += `<h2>${sl.h2}</h2>`;
    if(sl.p) html += `<p>${sl.p}</p>`;
    if(sl.quote) html += `<div class="quote">${sl.quote}</div>`;
    if(sl.ul) html += `<ul>${sl.ul.map(li=>`<li>${li}</li>`).join("")}</ul>`;
    if(sl.steps) html += `<div class="steps">${sl.steps.map(s=>`<div class="step"><div class="num">${s.n}</div><div class="txt"><strong>${s.strong}</strong>${s.txt}</div></div>`).join("")}</div>`;
    if(sl.products) html += `<div class="products">${sl.products.map(p=>`<div class="p"><div class="n">${p.n}</div><div class="d">${p.d}</div></div>`).join("")}</div>`;
    if(sl.context) html += `<div class="context">${sl.context}</div>`;
    html += `</div>`;
    return html;
  }).join("");
}
function renderDots(){
  const dots = document.getElementById("dots");
  dots.innerHTML = flatSlides.map((_,i)=>`<div class="dot ${i===globalIndex?'active':''}" onclick="goTo(${i})"></div>`).join("");
}
function update(){
  const tk = document.getElementById("track");
  tk.style.transition = 'transform 0.55s cubic-bezier(0.22,1,0.36,1)';
  tk.style.transform = `translateX(-${globalIndex*100}%)`;
  document.getElementById("count").textContent = `${globalIndex+1} / ${flatSlides.length}`;
  document.getElementById("prev").disabled = globalIndex===0;
  document.getElementById("next").disabled = globalIndex===flatSlides.length-1;
  document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('current',i===globalIndex));
  const total = flatSlides.length;
  const pct = total>1?(globalIndex/(total-1))*100:100;
  const pb = document.getElementById('progress'); if(pb) pb.style.setProperty('--progress',pct+'%');
  const cur = flatSlides[globalIndex];
  sectionIndex = cur.si;
  renderTabs();
  document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("active",i===globalIndex));
  const activeTab = document.querySelector(".tab.active");
  if(activeTab) activeTab.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
}
function go(dir){
  globalIndex = Math.max(0,Math.min(flatSlides.length-1,globalIndex+dir));
  update();
}
function goTo(i){globalIndex=i;update()}
function goToSection(si){
  const idx = flatSlides.findIndex(s=>s.si===si);
  if(idx>=0){globalIndex=idx;update()}
}
// ====== THEME ======
const THEMES=['dark','light','paper','ocean'];
function getTheme(){var t=localStorage.getItem('sc-theme');if(THEMES.includes(t))return t;if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches)return'light';return'dark'}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('#themeSwitcher .chip').forEach(c=>{
    c.classList.toggle('active',c.getAttribute('data-t')===t);
  });
}
function setTheme(t){localStorage.setItem('sc-theme',t);applyTheme(t)}
applyTheme(getTheme());

document.addEventListener("keydown",e=>{
  let btn=null;
  if(e.key==="ArrowLeft"){go(-1);btn=document.getElementById('prev');}
  if(e.key==="ArrowRight"){go(1);btn=document.getElementById('next');}
  if(btn){btn.classList.add('pressed');setTimeout(()=>btn.classList.remove('pressed'),180);}
  const h=document.querySelector('.key-hint');if(h&&!h.classList.contains('hidden')){h.classList.add('hidden');}
});
let touchX = 0;
document.addEventListener("touchstart",e=>touchX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
  const dx = e.changedTouches[0].clientX - touchX;
  if(Math.abs(dx)>50) go(dx>0?-1:1);
});

renderTabs();
renderSlides();
renderDots();
update();

// === D: 页面进入/离开过渡 ===
(function(){
  // 进入：DOM 准备好就标 ready
  function ready(){ document.body.classList.add('page-ready'); }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ready);
  } else {
    ready();
  }
  // 离开：拦截同站链接，淡出再跳转
  document.addEventListener('click', function(e){
    var a = e.target.closest && e.target.closest('a[href]');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href) return;
    // 跳过外链、锚点、新窗口、特殊协议、下载链接
    if (href.startsWith('#')) return;
    if (href.startsWith('http://') || href.startsWith('https://')) return;
    if (href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('javascript:')) return;
    if (a.target && a.target !== '_self') return;
    if (a.hasAttribute('download')) return;
    if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
    e.preventDefault();
    document.body.classList.add('page-leaving');
    setTimeout(function(){ window.location.href = href; }, 280);
  });
  // bfcache 回退时不要保留淡出态
  window.addEventListener('pageshow', function(e){
    if (e.persisted) {
      document.body.classList.remove('page-leaving');
      document.body.classList.add('page-ready');
    }
  });
})();

// === H: 快捷键遮罩 ===
(function(){
  var overlay = document.getElementById('kbOverlay');
  var trigger = document.getElementById('kbHintTrigger');
  var closeBtn = document.getElementById('kbClose');
  if (!overlay || !trigger) return;
  var show = function(){ overlay.classList.add('visible'); };
  var hide = function(){ overlay.classList.remove('visible'); };
  var toggle = function(){ overlay.classList.toggle('visible'); };
  trigger.addEventListener('click', toggle);
  if (closeBtn) closeBtn.addEventListener('click', hide);
  overlay.addEventListener('click', function(e){ if (e.target === overlay) hide(); });
  document.addEventListener('keydown', function(e){
    if (e.key === '?' || (e.key === '/' && e.shiftKey)) { e.preventDefault(); toggle(); }
    else if (e.key === 'Escape' && overlay.classList.contains('visible')) { hide(); }
  });
})();


// === J: PPT 触摸滑动手势 ===
(function(){
  if (typeof go !== 'function') return;
  var viewport = document.getElementById('viewport') || document.querySelector('.viewport');
  if (!viewport) return;
  var startX = 0, startY = 0, startT = 0, locked = null;
  viewport.addEventListener('touchstart', function(e){
    if (!e.touches || e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startT = Date.now();
    locked = null;
  }, { passive: true });
  viewport.addEventListener('touchmove', function(e){
    if (!e.touches || e.touches.length !== 1 || locked === 'v') return;
    var dx = e.touches[0].clientX - startX;
    var dy = e.touches[0].clientY - startY;
    if (locked === null) {
      if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
        locked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      }
    }
  }, { passive: true });
  viewport.addEventListener('touchend', function(e){
    if (!e.changedTouches || e.changedTouches.length === 0) return;
    var dx = e.changedTouches[0].clientX - startX;
    var dy = e.changedTouches[0].clientY - startY;
    var dt = Date.now() - startT;
    if (locked !== 'h') return;
    // 触发条件：水平位移 > 60px 或者高速滑动 > 180px/s
    var vx = Math.abs(dx) / Math.max(dt, 1) * 1000;
    if (Math.abs(dx) > 60 || vx > 180) {
      if (Math.abs(dx) > Math.abs(dy) * 1.2) {
        go(dx < 0 ? 1 : -1);
      }
    }
  }, { passive: true });
  // 首次访问显示一次提示
  try {
    if (window.matchMedia && window.matchMedia('(max-width: 767px)').matches) {
      if (!localStorage.getItem('swipeHintShown')) {
        var hint = document.getElementById('swipeHint');
        if (hint) {
          setTimeout(function(){
            hint.classList.add('visible');
            setTimeout(function(){ hint.classList.remove('visible'); }, 2600);
          }, 900);
        }
        localStorage.setItem('swipeHintShown', '1');
      }
    }
  } catch(e) {}
})();

</script>
